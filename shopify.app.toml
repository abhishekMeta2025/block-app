# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "d72b43d131b92e9ad7e094def4b265d6"
name = "block-test"
application_url = "https://block-app-0n8g.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# Note: read_metafields / write_metafields are NOT valid declared scopes in Shopify — Admin API metafield access is implicit for authenticated embedded apps.
scopes = "write_products, read_discounts, write_discounts, read_metaobjects, write_metaobjects, read_metaobject_definitions, write_metaobject_definitions, customer_read_metaobjects, unauthenticated_read_metaobjects"

[app_proxy]
url = "https://block-app-0n8g.onrender.com/api/proxy"
subpath = "block-loyalty"
prefix = "apps"

[auth]
redirect_urls = [ "https://block-app-0n8g.onrender.com/api/auth" ]
